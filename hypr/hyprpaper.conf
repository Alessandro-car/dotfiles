# ~/.config/hypr/hyprpaper.conf
# Current (0.55-era) sectioned syntax. The old flat form you'll see in older
# guides — `preload = ...` then `wallpaper = mon,path` — still parses for now
# but is deprecated. The wallpaper{} block below loads AND sets in one step.

splash = false

# Blank monitor = fallback applied to every output.
# fit_mode options: cover | contain | tile  (omit to stretch-fill)
wallpaper {
    monitor =
    path = ~/wallpaper/jap.png
    fit_mode = cover
}

# Per-monitor example — run `hyprctl monitors` for the names:
# wallpaper {
#     monitor = DP-1
#     path = ~/Pictures/wallpapers/ultrawide.png
#     fit_mode = cover
# }

# You can split wallpapers into separate files and pull them in (linear order):
# source = ~/.config/hypr/hyprpaper.d/*.conf
