# ~/.config/hypr/hyprland.conf
# Starter config for an i3 refugee. Tested-shape against Hyprland ~0.53–0.55.
# NOTE: a few subsystems (shadow, blur, gestures, window rules) have churned
# across versions. If a key errors on launch, run `hyprctl` / check the wiki
# section for YOUR installed version (hyprctl version) — flagged inline below.

################
### MONITORS ###
################
# `hyprctl monitors` to get names/modes. Examples:
monitor = ,preferred,auto,1          # fallback: every output, preferred mode
# monitor = DP-1,2560x1440@144,0x0,1
# monitor = HDMI-A-1,1920x1080@60,2560x0,1

#################
### AUTOSTART ###
#################
exec-once = waybar                                   # your polybar replacement
exec-once = /usr/bin/lib*/polkit-kde-authentication-agent-1   # path varies on Mint; verify
exec-once = wl-paste --watch cliphist store          # clipboard history (install cliphist)
exec-once = hyprpaper                              # wallpaper daemon
# exec-once = wal -R                                 # restore your pywal theme

#####################
### ENV / XWAYLAND ##
#####################
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
# ---- NVIDIA ONLY: uncomment these (and tell me your card for the full set) ----
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

###############
### GENERAL ###
###############
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    # maple-red → orange gradient, matching the wallpaper
    col.active_border = rgba(d23a1fee) rgba(e8923aee) 45deg
    col.inactive_border = rgba(43342aaa)
    layout = dwindle         # closest feel to i3's tiling; also: master
    resize_on_border = true
}

##################
### DECORATION ###
##################
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    # SHADOW: in older versions this was `drop_shadow = yes`. Newer versions
    # use the nested block below. Pick whichever your version accepts:
    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

#################
### ANIMATIONS ##
#################
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 5, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 6, ease
}

#############
### LAYOUT ##
#############
dwindle {
    # `pseudotile` option removed in 0.55. Pseudotiling is now per-window:
    # use the `pseudo` dispatcher (Super+P below) or `windowrule = match:class X, pseudo on`.
    preserve_split = true
}

#################
### KEYBINDS — i3 default scheme ####
#################
# i3's real default $mod is Alt (Mod1). Super is kept here to avoid clashing
# with app Alt-shortcuts; change to ALT on the next line for literal i3 feel.
$mod = SUPER
$term = kitty
$menu = wofi --show drun

# --- Core ---
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Q, killactive,           # i3: $mod+Shift+q kills the window
bind = $mod, D, exec, $menu                 # i3: dmenu/launcher
bind = $mod, F, fullscreen,                 # i3: fullscreen toggle
bind = $mod SHIFT, SPACE, togglefloating,   # i3: floating toggle
# $mod+space (i3: focus tiling/floating) has no clean Hyprland equivalent

# --- Focus: i3 default is j/k/l/; (NOT h/j/k/l) ---
bind = $mod, J, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, L, movefocus, u
bind = $mod, semicolon, movefocus, r
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# --- Move window: Shift + the same keys ---
bind = $mod SHIFT, J, movewindow, l
bind = $mod SHIFT, K, movewindow, d
bind = $mod SHIFT, L, movewindow, u
bind = $mod SHIFT, semicolon, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# --- Splits & layout ---
# i3 split h/v: dwindle is dynamic, so both just toggle the split orientation
bind = $mod, H, layoutmsg, togglesplit      # i3: split h
bind = $mod, V, layoutmsg, togglesplit      # i3: split v
bind = $mod, E, layoutmsg, togglesplit      # i3: layout toggle split
# i3 tabbed/stacking -> Hyprland groups (one concept, tab-like)
bind = $mod, W, togglegroup,                # i3: tabbed
bind = $mod, S, togglegroup,                # i3: stacking (no separate mode)
bind = $mod, Tab, changegroupactive, f      # cycle windows inside a group
bind = $mod, P, pseudo,                     # pseudotile the focused window

# --- Resize mode (i3 "$mod+r" -> a Hyprland submap) ---
bind = $mod, R, submap, resize
submap = resize
# i3 resize-mode defaults: j shrink-w, k grow-h, l shrink-h, ; grow-w
binde = , J, resizeactive, -30 0
binde = , K, resizeactive, 0 30
binde = , L, resizeactive, 0 -30
binde = , semicolon, resizeactive, 30 0
binde = , Left, resizeactive, -30 0
binde = , Down, resizeactive, 0 30
binde = , Up, resizeactive, 0 -30
binde = , Right, resizeactive, 30 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# --- Session ---
bind = $mod SHIFT, C, exec, hyprctl reload  # i3: reload config
bind = $mod SHIFT, R, exec, hyprctl reload  # i3: restart (reload suffices)
bind = $mod SHIFT, E, exit,                 # i3: exit — NOTE logs out immediately, no prompt

# --- Workspaces 1–10 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse drag move/resize (like i3 $mod+drag)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot (install grim + slurp)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

#####################
### WINDOW RULES ####
#####################
# 0.55 rewrote rules into props/effects: `match:<prop> <regex>, <effect> on`.
# The old `float, class:^(...)$` form no longer parses.
windowrule = match:class pavucontrol, float on
windowrule = match:title Open File, float on
