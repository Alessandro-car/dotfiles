font_family Iosevka NFM
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12
disable_ligatures always

cursor_shape block
shell_integration no-cursor


enable_audio_bell no

draw_minimal_borders yes


# BEGIN_KITTY_THEME
# Base2Tone Mall Dark
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
#font_family      IosevkaNerdFontMono-Regular
#bold_font        auto
#italic_font      auto
#bold_italic_font auto
# END_KITTY_FONTS
