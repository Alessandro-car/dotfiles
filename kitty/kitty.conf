# ~/.config/kitty/kitty.conf  —  Japanese Autumn (maple)

# --- Font ---
font_family      JetBrainsMono Nerd Font
font_size        11.0
adjust_line_height 110%

# --- Window ---
window_padding_width 10
background_opacity   0.95
confirm_os_window_close 0
cursor_shape         beam
scrollback_lines     10000

# --- Pywal integration (optional) ---
# include ~/.cache/wal/colors-kitty.conf

# --- Colors: derived from the wallpaper ---
foreground #e8dcc6
background #1c1510
selection_foreground #1c1510
selection_background #c9a96b
cursor #e8923a
cursor_text_color #1c1510
url_color #e8923a

# black
color0  #2e2118
color8  #43342a
# red (maple)
color1  #d23a1f
color9  #e8543a
# green (sage sky)
color2  #9fb79f
color10 #b3c9b0
# yellow (orange leaves)
color3  #e8923a
color11 #f0a850
# blue (water teal)
color4  #86aaa6
color12 #9fc0bc
# magenta (warm rose)
color5  #b5544a
color13 #c96b5f
# cyan
color6  #86aaa6
color14 #9fc0bc
# white
color7  #c9b99e
color15 #e8dcc6
